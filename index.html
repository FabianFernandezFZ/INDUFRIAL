<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canal Digital Indufrial - Landing Ejecutiva</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <section class="hero-section">
        <header>
            <h1 class="hero-title">Canal Digital Indufrial</h1>
            <p class="hero-subtitle">Adaptación a nuevas dinámicas de mercado</p>
            <div class="divider"></div>
            <p class="support-line">Canal complementario · Nuevos clientes · Fortalecimiento comercial</p>
        </header>

        <div class="cards-container">
            <div class="card">
                <div class="card-icon">
                    <i data-lucide="store" width="60" height="60"></i>
                </div>
                <h3 class="card-title">Pequeños negocios<br>(HORECA / tiendas)</h3>
            </div>

            <div class="card">
                <div class="card-icon">
                    <i data-lucide="building-2" width="60" height="60"></i>
                </div>
                <h3 class="card-title">Clientes corporativos</h3>
            </div>

            <div class="card">
                <div class="card-icon">
                    <i data-lucide="container" width="60" height="60"></i>
                </div>
                <h3 class="card-title">Vending</h3>
            </div>

            <div class="card">
                <div class="card-icon">
                    <i data-lucide="globe" width="60" height="60"></i>
                </div>
                <h3 class="card-title">Proyectos internacionales</h3>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
